<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad-ios" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="180" height="180" rx="40" fill="url(#grad-ios)"/>

  <!-- Inner border -->
  <rect x="15" y="15" width="150" height="150" rx="32" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Text "AD" in upper part -->
  <text x="90" y="80" font-family="Arial, sans-serif" font-size="50" font-weight="bold" text-anchor="middle" fill="white">AD</text>

  <!-- Text "ROP" in lower part -->
  <text x="90" y="120" font-family="Arial, sans-serif" font-size="35" font-weight="bold" text-anchor="middle" fill="white">ROP</text>
</svg>
