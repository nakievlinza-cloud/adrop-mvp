<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle background with gradient -->
  <circle cx="64" cy="64" r="58" fill="url(#grad)"/>

  <!-- Inner circle border (light line) -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Text "AD" in upper part -->
  <text x="64" y="56" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="white">AD</text>

  <!-- Text "ROP" in lower part -->
  <text x="64" y="82" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="white">ROP</text>
</svg>
